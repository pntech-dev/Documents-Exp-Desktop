<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {{ font-family: sans-serif; }}
        h1 {{ text-align: left; font-size: 18pt; margin-bottom: 20px; }}
        table {{ width: 100%; border-collapse: collapse; margin-top: 10px;}}
        th {{ border: 1px solid #000; padding: 5px; background-color: #f0f0f0; font-weight: bold; font-size: 14pt;}}
        td {{ border: 1px solid #000; padding: 5px; font-size: 12pt;}}
    </style>
</head>
<body>
    <h1>{code} - {name}</h1>
    <table>
        <thead>
            <tr>
                <th width="70%">Наименование</th>
                <th width="30%">Код</th>
            </tr>
        </thead>
        <tbody>
            {rows}
        </tbody>
    </table>
</body>
</html>
