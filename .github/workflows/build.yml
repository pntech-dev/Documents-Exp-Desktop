name: Build and Release

on:
  push:
    branches:
      - main
      - development
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Create Config
      run: Copy-Item config.example.yaml config.yaml -ErrorAction Ignore

    - name: Configure API URL
      run: |
        (Get-Content config.yaml) -replace "base_url: '.*'", "base_url: '${{ secrets.API_BASE_URL }}'" | Set-Content config.yaml

    - name: Determine Version
      id: versioning
      shell: bash
      run: |
        if [[ $GITHUB_REF == refs/tags/v* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        else
          VERSION="1.1.${{ github.run_number }}"
        fi
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

    - name: Build Executable
      run: pyinstaller --noconfirm "Documents Exp.spec"

    - name: Compile Installer (Inno Setup)
      uses: MinnowArts/inno-setup-action@v1.2.2
      with:
        path: setup_script.iss
        options: /DMyAppVersion=${{ steps.versioning.outputs.VERSION }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DocumentsExp-Setup-${{ steps.versioning.outputs.VERSION }}
        path: Output/*.exe

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: Output/DocumentsExp_Setup_${{ steps.versioning.outputs.VERSION }}.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}